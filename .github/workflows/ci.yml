name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: backend/requirements.txt
    
    - name: Install dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Lint with flake8
      run: |
        cd backend
        pip install flake8
        flake8 app/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 app/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Run tests
      run: |
        cd backend
        # Set PYTHONPATH to current directory so tests can import app
        export PYTHONPATH="${PYTHONPATH}:${PWD}"
        pytest tests/ -v --tb=short
      env:
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    
    - name: Install dependencies
      run: |
        cd frontend
        npm ci
    
    - name: TypeScript check
      run: |
        cd frontend
        npx tsc --noEmit
    
    - name: Build
      run: |
        cd frontend
        npm run build

  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Check for secrets in code
      run: |
        if grep -rn "ANTHROPIC_API_KEY=sk-ant-[a-zA-Z0-9_-]\{20,\}" \
           --include="*.py" \
           --include="*.ts" \
           --include="*.tsx" \
           --include="*.js" \
           --include="*.jsx" \
           --exclude-dir=.git \
           --exclude-dir=node_modules \
           --exclude-dir=venv \
           --exclude-dir=tests; then
          echo "⚠️ WARNING: Real API key found in code!"
          exit 1
        fi
        echo "✅ No real API keys found in source code"
    
    - name: Check file sizes
      run: |
        large_files=$(find . -type f -size +10M -not -path "./.git/*" -not -path "*/node_modules/*" -not -path "*/venv/*")
        if [ -n "$large_files" ]; then
          echo "⚠️ WARNING: Large files found:"
          echo "$large_files"
          exit 1
        fi
        echo "✅ No large files found"